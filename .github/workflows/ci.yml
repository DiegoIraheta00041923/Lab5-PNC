name: CI

on:
  push:
    branches: ["develop","main"]
  pull_request:
    branches: ["develop","main"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Give permission to Maven Wrapper
        working-directory: Lab2
        run: chmod +x mvnw

      - name: Run Tests
        working-directory: Lab2
        run: && ./mvnw test

      - name: Package
        working-directory: Lab2
        run: ./mvnw package
